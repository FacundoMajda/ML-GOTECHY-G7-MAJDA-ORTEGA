# Nota: la config de `python-downloads = "never"` se pasa por env var en el Dockerfile
# (UV_PYTHON_DOWNLOADS=never) porque [tool.uv] no acepta esa key para el caso runtime.

# PyTorch CPU-only index. Sin esto, `uv lock` resuelve torch==2.12.1 desde PyPI
# (build con CUDA, no CPU) y rompe la imagen. Pin explícito al índice CPU.
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu" },
]
torchvision = [
    { index = "pytorch-cpu" },
]
