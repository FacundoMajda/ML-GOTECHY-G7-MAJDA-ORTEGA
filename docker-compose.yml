services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      YOLO_MODEL_PATH: /app/src/inference/yolo11n.pt
      OUTPUT_DIR: /app/outputs
      REPORTS_DIR: /app/reports
      UPLOADS_DIR: /app/uploads
    volumes:
      - app_outputs:/app/outputs
      - app_reports:/app/reports
      - app_uploads:/app/uploads
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_HOSTNAME: video-analytics
    restart: unless-stopped

volumes:
  app_outputs:
  app_reports:
  app_uploads:
